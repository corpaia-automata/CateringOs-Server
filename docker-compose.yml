services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: CateringOs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 786
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d CateringOs"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --settings=config.settings.production &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120
             --access-logfile -
             --error-logfile -"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_files:
  media_files:
